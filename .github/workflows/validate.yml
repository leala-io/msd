name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install validator dependencies
        working-directory: validator
        run: npm ci

      - name: Meta-validate schema against JSON Schema Draft 2020-12
        run: |
          node -e '
            const fs = require("fs");
            const Ajv = require("./validator/node_modules/ajv/dist/2020");
            const addFormats = require("./validator/node_modules/ajv-formats");
            const ajv = new Ajv({ allErrors: true, strict: false });
            addFormats(ajv);
            let ok = true;
            const check = (label, schema) => {
              if (!ajv.validateSchema(schema)) {
                ok = false;
                console.error("FAIL " + label);
                console.error(JSON.stringify(ajv.errors, null, 2));
              } else {
                console.log("ok   " + label);
              }
            };
            for (const f of fs.readdirSync("registry/v0.1.0")) {
              if (!f.endsWith(".json")) continue;
              const reg = JSON.parse(fs.readFileSync("registry/v0.1.0/" + f, "utf8"));
              check("registry/v0.1.0/" + f, reg);
              ajv.addSchema(reg);
            }
            const root = JSON.parse(fs.readFileSync("schema/v0.1.0/msd.schema.json", "utf8"));
            check("schema/v0.1.0/msd.schema.json", root);
            if (!ok) process.exit(1);
            console.log("all schema + registry files are meta-valid (Draft 2020-12)");
          '

      - name: Examples and valid fixtures must PASS
        run: |
          set -e
          for f in $(find examples testFixtures/v0.1.0/valid -name '*.msd.json' | sort); do
            echo "::group::$f"
            node validator/validate.js "$f"
            echo "::endgroup::"
          done

      - name: Invalid fixtures must FAIL
        run: |
          fail=0
          for f in $(find testFixtures/v0.1.0/invalid -name '*.msd.json' | sort); do
            if node validator/validate.js "$f"; then
              echo "ERROR: $f validated but should have been rejected"
              fail=1
            else
              echo "OK (rejected): $f"
            fi
          done
          exit $fail

  web-identity:
    name: Web validator identity gate (web core ≡ CLI core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      # ajv + ajv-formats for the bundle resolve from validator/node_modules
      # (the bare require lives in validator/core.js).
      - name: Install validator dependencies
        working-directory: validator
        run: npm ci

      # esbuild for the web bundle/identity test.
      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web bundle
        working-directory: web
        run: npm run build

      - name: Identity gate — all fixtures, web core == CLI core
        working-directory: web
        run: node test/identity.mjs

  web-engine-identity:
    name: Web engine identity gate (bundled buildFlexFeed ≡ CLI engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      # esbuild bundles the engine in-test (test/engine-identity.mjs); no app build
      # or validator deps needed — the gate JSON-parses docs and diffs engine output.
      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Engine identity gate — bundled engine == source engine (byte-equal feeds)
        working-directory: web
        run: node test/engine-identity.mjs
